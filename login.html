<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - The R Gilmore Study Guide</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <script type="module" src="js/login.js"></script>
</head>
<body>

<header>
    <h1>The R Gilmore Study Guide</h1>
    <div class="subtitle">"Life's short. Talk fast. Code faster."</div>
    <div class="header-icons">☕ 🍂 📚</div>
</header>

<div class="login-container">
    <div class="concept-card login-card">
        <h2 class="text-center">Welcome Back</h2>
        <p class="text-center text-muted" style="margin-top: -10px; margin-bottom: 25px;">Please enter your credentials to continue your studies.</p>

        <form id="login-form" class="login-form">
            <div class="input-group">
                <label for="username" class="login-label">Username</label>
                <input type="text" id="username" class="editor-input login-input" placeholder="e.g. ParisGeller101" required>
            </div>

            <div class="input-group mt-20">
                <label for="password" class="login-label">Password</label>
                <input type="password" id="password" class="editor-input login-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="check-btn login-btn mt-30">Login</button>
        </form>

        <form id="register-form" class="login-form" style="display: none;">
            <div class="input-group">
                <label for="reg-username" class="login-label">New Username</label>
                <input type="text" id="reg-username" class="editor-input login-input" placeholder="e.g. RoryG" required>
            </div>

            <div class="input-group mt-20">
                <label for="reg-password" class="login-label">New Password</label>
                <input type="password" id="reg-password" class="editor-input login-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="check-btn login-btn mt-30" style="background-color: var(--yale-blue);">Create Account</button>
        </form>

        <div id="login-message" class="text-center mt-20" style="color: red; display: none;"></div>

        <div class="town-divider login-divider">
            <span>🍂</span>
        </div>

        <p id="toggle-text" class="text-center create-account-text">
            Don't have an account? <br>
            <a href="#" id="toggle-form" class="text-yale-blue fw-bold">Create one at the town meeting</a>
        </p>
    </div>
</div>

<footer class="footer-text mt-60">
    <p>In Omnia Paratus • Created for BILD 5</p>
    <p style="font-size: 0.8em; margin-top: 10px;">Printed in Stars Hollow • Do not copy without permission.</p>
</footer>

</body>
</html>
